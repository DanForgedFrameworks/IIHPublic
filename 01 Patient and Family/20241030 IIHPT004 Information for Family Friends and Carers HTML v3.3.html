  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html lang=\"en\"><head>\n  <meta charset=\"UTF-8\">\n  <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n  <title>Information for Family, Friends and Carers — IIH UK<\u002Ftitle>\n  <meta name=\"description\" content=\"A plain-English guide for the family, friends and carers of someone with Idiopathic Intracranial Hypertension (IIH): what it is, why it feels the way it does, how to help, and how to look after yourself.\">\n  <meta name=\"keywords\" content=\"IIH, idiopathic intracranial hypertension, carers, family, friends, support, IIH UK\">\n  <meta name=\"author\" content=\"IIH UK\">\n\n  <style>\n    /* =========================================================\n       DESIGN TOKENS — IIH UK brand\n       ========================================================= */\n    :root {\n      --color-primary:       #3CBBBA;\n      --color-primary-dark:  #2A9998;\n      --color-primary-tint:  #EBF8F8;\n      --color-text:          #1A2B4A;\n      --color-text-muted:    #4A5568;\n      --color-bg:            #FFFFFF;\n      --color-surface:       #F5F5F5;\n      --color-surface-alt:   #EEF1F4;\n      --color-border:        #D1D5DB;\n      --color-focus:         #3CBBBA;\n      --color-warning-bg:    #FFF8E1;\n      --color-warning-text:  #92520A;\n      --color-warning-border:#D4730A;\n      --color-alert-bg:      #FFF0EE;\n      --color-alert-text:    #922B21;\n      --color-alert-border:  #C0392B;\n\n      --font-family: 'Oxygen', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Ubuntu, Cantarell, sans-serif;\n      --font-size-sm:   1rem;\n      --font-size-base: 1.125rem;\n      --font-size-lg:   1.25rem;\n      --font-size-xl:   1.5rem;\n      --font-size-2xl:  1.875rem;\n\n      --line-height: 1.65;\n      --measure:     68ch;\n\n      --space-xs:  0.5rem;\n      --space-sm:  0.75rem;\n      --space-md:  1rem;\n      --space-lg:  1.5rem;\n      --space-xl:  2.5rem;\n      --space-2xl: 4rem;\n\n      --radius:       6px;\n      --radius-lg:    12px;\n      --touch-target: 44px;\n      --shadow:       0 2px 8px rgba(26, 43, 74, 0.10);\n      --shadow-lg:    0 8px 24px rgba(26, 43, 74, 0.14);\n    }\n\n    /* Self-hosted Oxygen (design-system webfont) */\n    @font-face { font-family:'Oxygen'; font-style:normal; font-weight:300; font-display:swap; src:url(\"9baf3c33-9adb-483d-8e82-2bf8d6b7ad72\") format('truetype'); }\n    @font-face { font-family:'Oxygen'; font-style:normal; font-weight:400; font-display:swap; src:url(\"8090a0c5-8805-4d9a-9427-7c7068c3ac45\") format('truetype'); }\n    @font-face { font-family:'Oxygen'; font-style:normal; font-weight:700; font-display:swap; src:url(\"4751856c-c2a4-4570-a6ea-0a2bb1ebd511\") format('truetype'); }\n\n    /* =========================================================\n       RESET + BASE\n       ========================================================= */\n    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }\n    html { font-size: 100%; scroll-behavior: smooth; }\n    body {\n      font-family: var(--font-family);\n      font-size: var(--font-size-base);\n      line-height: var(--line-height);\n      color: var(--color-text);\n      background: var(--color-bg);\n    }\n    img { max-width: 100%; height: auto; display: block; }\n    a { color: var(--color-primary-dark); text-underline-offset: 3px; }\n    a:hover { color: var(--color-text); }\n\n    .skip-link {\n      position: absolute; top: -100%; left: var(--space-md);\n      background: var(--color-text); color: #fff;\n      padding: var(--space-sm) var(--space-md);\n      border-radius: 0 0 var(--radius) var(--radius);\n      font-weight: 700; z-index: 999; text-decoration: none; transition: top .2s;\n    }\n    .skip-link:focus { top: 0; }\n\n    :focus-visible { outline: 3px solid var(--color-focus); outline-offset: 3px; border-radius: 2px; }\n\n    .container { width: 100%; max-width: 1180px; margin: 0 auto; padding: 0 var(--space-md); }\n    .container--narrow { max-width: 860px; }\n\n    /* =========================================================\n       HEADER + BANNER\n       ========================================================= */\n    .site-header {\n      background: var(--color-text); color: #fff;\n      padding: var(--space-lg) 0; border-bottom: 4px solid var(--color-primary);\n    }\n    .site-header .container { display: flex; align-items: center; gap: var(--space-lg); flex-wrap: wrap; }\n    .site-logo { width: 72px; height: 72px; border-radius: 50%; flex-shrink: 0; }\n    .site-header-text { flex: 1; min-width: 200px; }\n    .site-title { font-size: var(--font-size-xl); font-weight: 700; line-height: 1.2; color: #fff; }\n    .site-subtitle { font-size: var(--font-size-sm); color: var(--color-primary); margin-top: var(--space-xs); }\n\n    .asset-banner { background: var(--color-primary); padding: var(--space-lg) 0; }\n    .asset-banner h1 { font-size: var(--font-size-2xl); font-weight: 700; color: var(--color-text); line-height: 1.2; }\n    .asset-banner-inner {\n      display: flex;\n      align-items: center;\n      justify-content: space-between;\n      gap: 1rem;\n      flex-wrap: wrap;\n    }\n    .print-pill {\n      display: inline-flex;\n      align-items: center;\n      gap: 0.4rem;\n      background: #FFFFFF;\n      color: #1A2B4A;\n      border: 2px solid #FFFFFF;\n      border-radius: 999px;\n      padding: 0.5rem 1.1rem;\n      font-size: 0.9rem;\n      font-weight: 600;\n      text-decoration: none;\n      white-space: nowrap;\n      min-height: 44px;\n      cursor: pointer;\n    }\n    .print-pill:hover, .print-pill:focus {\n      background: transparent;\n      color: #FFFFFF;\n      outline: 3px solid #FFFFFF;\n      outline-offset: 2px;\n    }\n\n    /* =========================================================\n       CONTROL BAR — view switch + in-page nav (sticky)\n       ========================================================= */\n    .controlbar {\n      background: var(--color-surface);\n      border-bottom: 1px solid var(--color-border);\n      position: sticky; top: 0; z-index: 100;\n    }\n    .controlbar-inner {\n      display: flex; align-items: center; gap: var(--space-sm);\n      padding: var(--space-sm) 0; flex-wrap: wrap;\n    }\n    .controlbar-label {\n      font-size: .8rem; font-weight: 700; letter-spacing: .04em; text-transform: uppercase;\n      color: var(--color-text-muted);\n    }\n\n    .view-switch {\n      display: inline-flex; background: var(--color-bg);\n      border: 2px solid var(--color-primary); border-radius: 999px; padding: 3px; flex-shrink: 0;\n    }\n    .view-switch button {\n      appearance: none; border: none; cursor: pointer;\n      font-family: var(--font-family); font-size: .95rem; font-weight: 700;\n      color: var(--color-primary-dark); background: transparent;\n      padding: 0.6rem 1.2rem; min-height: 44px; border-radius: 999px;\n      display: inline-flex; align-items: center; gap: 6px; transition: background .15s, color .15s;\n    }\n    .view-switch button[aria-pressed=\"true\"] { background: var(--color-primary); color: #fff; }\n    .view-switch button:hover:not([aria-pressed=\"true\"]) { background: var(--color-primary-tint); }\n\n    /* =========================================================\n       LAYOUT WITH SIDEBAR (vertical topic jumps)\n       ========================================================= */\n    .layout {\n      display: grid;\n      grid-template-columns: 248px minmax(0, 1fr);\n      gap: var(--space-xl);\n      align-items: start;\n    }\n    .sidebar { position: sticky; top: 76px; }\n    .sidebar-title {\n      font-size: .8rem; font-weight: 700; letter-spacing: .04em; text-transform: uppercase;\n      color: var(--color-text-muted); margin-bottom: var(--space-sm); padding-left: var(--space-xs);\n    }\n    .topic-nav ul { list-style: none; display: flex; flex-direction: column; gap: 4px; }\n    .topic-nav button {\n      appearance: none; cursor: pointer; font-family: var(--font-family);\n      width: 100%; display: flex; align-items: center; gap: var(--space-sm);\n      padding: var(--space-xs) var(--space-sm); font-size: .95rem; font-weight: 600; line-height: 1.25;\n      color: var(--color-text); background: var(--color-bg);\n      border: 1px solid var(--color-border); border-left: 3px solid transparent;\n      border-radius: var(--radius); text-align: left; min-height: 44px;\n      transition: background .15s, border-color .15s;\n    }\n    .topic-nav button:hover { background: var(--color-primary-tint); border-left-color: var(--color-primary); }\n    .topic-nav button[aria-current=\"true\"] {\n      background: var(--color-primary-tint); border-color: var(--color-primary); border-left-color: var(--color-primary-dark);\n    }\n    .topic-nav .nav-letter {\n      flex-shrink: 0; width: 26px; height: 26px; border-radius: 50%;\n      display: inline-flex; align-items: center; justify-content: center;\n      font-size: .8rem; font-weight: 700; color: var(--color-primary-dark); background: var(--color-primary-tint);\n    }\n    .topic-nav button[aria-current=\"true\"] .nav-letter { background: var(--color-primary); color: #fff; }\n\n    /* =========================================================\n       MAIN + INTRO\n       ========================================================= */\n    .main-content { padding: var(--space-xl) 0 var(--space-2xl); }\n    .intro { margin-bottom: var(--space-xl); max-width: var(--measure); }\n    .intro .lead { font-size: var(--font-size-lg); margin-bottom: var(--space-md); }\n    .intro p { margin-bottom: var(--space-md); color: var(--color-text-muted); }\n    .intro p:last-child { margin-bottom: 0; }\n\n    /* =========================================================\n       SHARED RICH-TEXT (topic bodies)\n       ========================================================= */\n    .rich p { margin-bottom: var(--space-md); }\n    .rich p:last-child { margin-bottom: 0; }\n    .rich ul, .rich ol { margin: var(--space-sm) 0 var(--space-md) var(--space-lg); }\n    .rich li { margin-bottom: var(--space-xs); }\n    .rich h3 { font-size: var(--font-size-lg); margin: var(--space-lg) 0 var(--space-sm); color: var(--color-text); }\n    .rich h3:first-child { margin-top: 0; }\n    .rich strong { font-weight: 700; }\n\n    .symptom-cols { display: grid; grid-template-columns: 1fr; gap: var(--space-md) var(--space-xl); margin: var(--space-sm) 0 var(--space-md); }\n    @media (min-width: 560px) { .symptom-cols { grid-template-columns: 1fr 1fr; } }\n    .symptom-group h3 { margin-top: 0; }\n    .symptom-group ul { margin: var(--space-xs) 0 0 var(--space-lg); }\n\n    /* Callouts */\n    .callout { border-radius: var(--radius); padding: var(--space-md) var(--space-lg); margin: var(--space-md) 0; border-left: 4px solid; }\n    .callout:last-child { margin-bottom: 0; }\n    .callout-warning { background: var(--color-warning-bg); border-color: var(--color-warning-border); color: var(--color-warning-text); }\n    .callout-alert   { background: var(--color-alert-bg);   border-color: var(--color-alert-border);   color: var(--color-alert-text); }\n    .callout-info    { background: var(--color-primary-tint); border-color: var(--color-primary); color: var(--color-text); }\n    .callout-warning::before { content: \"⚠ \"; font-weight: 700; }\n    .callout-alert::before   { content: \"⛔ \"; font-weight: 700; }\n    .callout-info::before    { content: \"ℹ \"; font-weight: 700; }\n\n    /* Signposts */\n    .signpost {\n      display: flex; align-items: center; gap: var(--space-md);\n      padding: var(--space-md); background: var(--color-surface);\n      border: 1px solid var(--color-border); border-left: 4px solid var(--color-primary);\n      border-radius: var(--radius); margin: var(--space-sm) 0;\n      text-decoration: none; color: var(--color-text); font-weight: 600; min-height: var(--touch-target);\n    }\n    .signpost:last-child { margin-bottom: 0; }\n    .signpost:hover { background: var(--color-primary-tint); border-left-color: var(--color-primary-dark); }\n    .signpost-icon { font-size: 1.4rem; flex-shrink: 0; }\n\n    /* Watch / video links (IIH UK YouTube) */\n    .watch { margin-top: var(--space-lg); }\n    .watch-label {\n      font-size: .8rem; font-weight: 700; letter-spacing: .04em; text-transform: uppercase;\n      color: var(--color-text-muted); margin-bottom: var(--space-xs);\n    }\n    .video-link {\n      display: flex; align-items: center; gap: var(--space-sm);\n      padding: var(--space-sm) var(--space-md); margin-bottom: var(--space-xs);\n      background: var(--color-surface); border: 1px solid var(--color-border);\n      border-left: 4px solid var(--color-alert-border); border-radius: var(--radius);\n      text-decoration: none; color: var(--color-text); font-weight: 600; min-height: var(--touch-target);\n    }\n    .video-link:last-child { margin-bottom: 0; }\n    .video-link:hover { background: var(--color-primary-tint); }\n    .video-ico {\n      flex-shrink: 0; width: 30px; height: 30px; border-radius: 6px;\n      background: var(--color-alert-border); color: #fff;\n      display: inline-flex; align-items: center; justify-content: center; font-size: .75rem;\n    }\n    .video-txt { flex: 1; }\n    .video-len {\n      font-size: .8rem; font-weight: 700; color: var(--color-text-muted);\n      white-space: nowrap; background: var(--color-bg);\n      border: 1px solid var(--color-border); border-radius: 999px; padding: 2px 8px;\n    }\n\n    /* =========================================================\n       VIEW: CARDS (3 x 3 grid + detail panel)\n       ========================================================= */\n    .cards-grid {\n      display: grid; grid-template-columns: repeat(3, 1fr);\n      gap: var(--space-md); margin-bottom: var(--space-lg);\n    }\n    @media (max-width: 860px) { .cards-grid { grid-template-columns: repeat(2, 1fr); } }\n    @media (max-width: 560px) { .cards-grid { grid-template-columns: 1fr; } }\n\n    .topic-card {\n      position: relative; display: flex; flex-direction: column; gap: var(--space-sm);\n      text-align: left; cursor: pointer; appearance: none;\n      font-family: var(--font-family);\n      background: var(--color-bg); color: var(--color-text);\n      border: 1px solid var(--color-border); border-top: 4px solid var(--color-primary);\n      border-radius: var(--radius-lg); padding: var(--space-lg);\n      min-height: 168px; transition: transform .15s, box-shadow .15s, border-color .15s, background .15s;\n    }\n    .topic-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-lg); }\n    .topic-card[aria-expanded=\"true\"] {\n      border-color: var(--color-primary); background: var(--color-primary-tint);\n      box-shadow: var(--shadow);\n    }\n    .topic-card .card-letter {\n      display: inline-flex; align-items: center; justify-content: center;\n      width: 38px; height: 38px; border-radius: 50%;\n      background: var(--color-primary-tint); color: var(--color-primary-dark);\n      font-weight: 700; font-size: 1.05rem; flex-shrink: 0;\n    }\n    .topic-card[aria-expanded=\"true\"] .card-letter { background: var(--color-primary); color: #fff; }\n    .topic-card .card-title { font-size: var(--font-size-lg); font-weight: 700; line-height: 1.25; }\n    .topic-card .card-teaser { font-size: var(--font-size-sm); color: var(--color-text-muted); }\n    .topic-card .card-cue {\n      margin-top: auto; font-size: .85rem; font-weight: 700; color: var(--color-primary-dark);\n      display: inline-flex; align-items: center; gap: 6px;\n    }\n    .topic-card[aria-expanded=\"true\"] .card-cue::after { content: \"▲\"; font-size: .7em; }\n    .topic-card[aria-expanded=\"false\"] .card-cue::after { content: \"▼\"; font-size: .7em; }\n\n\n\n    /* Accessed / \"already read\" cue — italic title */\n    .topic-card.is-accessed .card-title { font-style: italic; }\n    .topic-nav button.is-accessed { font-style: italic; }\n\n    /* Detail panel below the grid */\n    .detail-panel {\n      border: 1px solid var(--color-border); border-left: 5px solid var(--color-primary);\n      border-radius: var(--radius-lg); background: var(--color-bg);\n      box-shadow: var(--shadow); overflow: hidden; scroll-margin-top: 140px;\n    }\n    .detail-panel[hidden] { display: none; }\n    .detail-head {\n      display: flex; align-items: flex-start; gap: var(--space-md);\n      padding: var(--space-lg) var(--space-lg) 0;\n    }\n    .detail-head .card-letter {\n      display: inline-flex; align-items: center; justify-content: center;\n      width: 44px; height: 44px; border-radius: 50%;\n      background: var(--color-primary); color: #fff; font-weight: 700; font-size: 1.15rem; flex-shrink: 0;\n    }\n    .detail-head h2 { font-size: var(--font-size-xl); line-height: 1.2; flex: 1; }\n    .detail-close {\n      appearance: none; cursor: pointer; font-family: var(--font-family);\n      background: var(--color-bg); border: 1px solid var(--color-border);\n      border-radius: var(--radius); color: var(--color-text);\n      font-size: .85rem; font-weight: 600; padding: 0 var(--space-sm);\n      min-height: 44px; flex-shrink: 0;\n    }\n    .detail-close:hover { background: var(--color-surface); }\n    .detail-body { padding: var(--space-md) var(--space-lg) var(--space-lg); max-width: var(--measure); }\n    .detail-nav {\n      display: flex; justify-content: space-between; gap: var(--space-sm);\n      border-top: 1px solid var(--color-border); padding: var(--space-md) var(--space-lg);\n      background: var(--color-surface);\n    }\n    .detail-nav button {\n      appearance: none; cursor: pointer; font-family: var(--font-family);\n      background: var(--color-bg); border: 1px solid var(--color-border);\n      border-radius: var(--radius); color: var(--color-text);\n      font-size: .9rem; font-weight: 600; padding: var(--space-xs) var(--space-md); min-height: 44px;\n    }\n    .detail-nav button:hover:not(:disabled) { background: var(--color-primary-tint); border-color: var(--color-primary); }\n    .detail-nav button:disabled { opacity: .4; cursor: default; }\n\n    /* =========================================================\n       VIEW: ACCORDION (list)\n       ========================================================= */\n    .accordion-controls { display: flex; gap: var(--space-sm); margin-bottom: var(--space-md); flex-wrap: wrap; }\n    .btn-secondary {\n      display: inline-flex; align-items: center; gap: 6px;\n      padding: var(--space-xs) var(--space-md); min-height: var(--touch-target);\n      font-size: var(--font-size-sm); font-weight: 600; color: var(--color-text);\n      background: var(--color-bg); border: 2px solid var(--color-primary);\n      border-radius: var(--radius); cursor: pointer; font-family: var(--font-family);\n    }\n    .btn-secondary:hover { background: var(--color-primary-tint); }\n\n    .accordion { border: 1px solid var(--color-border); border-radius: var(--radius); margin-bottom: var(--space-sm); overflow: hidden; }\n    .accordion-trigger {\n      width: 100%; display: flex; align-items: center; justify-content: space-between; gap: var(--space-md);\n      padding: var(--space-md) var(--space-lg); min-height: var(--touch-target);\n      background: var(--color-surface); border: none; border-left: 4px solid var(--color-primary);\n      cursor: pointer; text-align: left; font-family: var(--font-family);\n      font-size: var(--font-size-base); font-weight: 700; color: var(--color-text); transition: background .2s;\n    }\n    .accordion-trigger:hover { background: var(--color-primary-tint); }\n    .accordion-trigger[aria-expanded=\"true\"] { background: var(--color-primary-tint); border-left-color: var(--color-primary-dark); }\n    .acc-titlewrap { display: flex; align-items: center; gap: var(--space-sm); }\n    .acc-letter {\n      display: inline-flex; align-items: center; justify-content: center;\n      width: 30px; height: 30px; border-radius: 50%;\n      background: var(--color-primary-tint); color: var(--color-primary-dark);\n      font-weight: 700; font-size: .9rem; flex-shrink: 0;\n    }\n    .accordion-trigger[aria-expanded=\"true\"] .acc-letter { background: var(--color-primary); color: #fff; }\n    .accordion-icon { font-size: 1.1rem; flex-shrink: 0; transition: transform .3s ease; color: var(--color-primary-dark); }\n    .accordion-trigger[aria-expanded=\"true\"] .accordion-icon { transform: rotate(180deg); }\n    .accordion-panel { overflow: hidden; max-height: 0; transition: max-height .35s ease; }\n    .accordion-content { padding: var(--space-lg); border-left: 4px solid var(--color-primary); max-width: var(--measure); }\n\n    /* =========================================================\n       HELP & SUPPORT BAND (shown in every view)\n       ========================================================= */\n    .help-band { margin-top: var(--space-xl); padding-top: var(--space-xl); border-top: 2px solid var(--color-border); }\n    .help-band h2 { font-size: var(--font-size-xl); margin-bottom: var(--space-sm); }\n    .help-band > p { color: var(--color-text-muted); margin-bottom: var(--space-md); max-width: var(--measure); }\n    .help-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: var(--space-sm); }\n    .help-grid .signpost { flex: 1 1 calc(20% - var(--space-sm)); min-width: 200px; margin: 0; }\n    .signpost.sp-teal   { border-left-color: var(--color-primary); }\n    .signpost.sp-blue   { border-left-color: oklch(0.60 0.13 250); }\n    .signpost.sp-red    { border-left-color: var(--color-alert-border); }\n    .signpost.sp-green  { border-left-color: oklch(0.58 0.13 150); }\n    .signpost.sp-indigo { border-left-color: oklch(0.55 0.16 295); }\n    .signpost.sp-amber  { border-left-color: var(--color-warning-border); }\n    .signpost.sp-navy   { border-left-color: var(--color-text); }\n\n    /* =========================================================\n       FOOTER\n       ========================================================= */\n    .site-footer { background: var(--color-text); color: #fff; padding: var(--space-xl) 0; margin-top: var(--space-2xl); }\n    .footer-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: var(--space-xl); margin-bottom: var(--space-xl); }\n    .footer-section h2 { font-size: var(--font-size-sm); font-weight: 700; color: var(--color-primary); text-transform: uppercase; letter-spacing: .05em; margin-bottom: var(--space-md); }\n    .footer-section p, .footer-section li { font-size: var(--font-size-sm); color: rgba(255,255,255,.85); margin-bottom: var(--space-xs); }\n    .footer-section ul { list-style: none; }\n    .footer-section a { color: var(--color-primary); }\n    .footer-bottom { border-top: 1px solid rgba(255,255,255,.15); padding-top: var(--space-lg); font-size: .875rem; color: rgba(255,255,255,.6); }\n    .footer-disclaimer { background: rgba(255,255,255,.05); border: 1px solid rgba(255,255,255,.1); border-radius: var(--radius); padding: var(--space-md); margin-bottom: var(--space-md); font-size: .875rem; color: rgba(255,255,255,.8); }\n\n    /* =========================================================\n       PRINT — show everything, hide controls\n       ========================================================= */\n    .print-only { display: none; }\n    @media (max-width: 900px) {\n      .layout { grid-template-columns: 1fr; gap: var(--space-lg); }\n      .sidebar { position: static; }\n      .topic-nav ul { flex-direction: row; flex-wrap: wrap; gap: var(--space-xs); }\n      .topic-nav button { width: auto; min-height: 44px; }\n      .help-grid .signpost { flex-basis: calc(50% - var(--space-sm)); }\n    }\n    @media (max-width: 600px) {\n      .site-header .container { flex-direction: column; align-items: flex-start; }\n      .site-logo { width: 56px; height: 56px; }\n      .asset-banner h1 { font-size: var(--font-size-xl); }\n      .help-grid .signpost { flex-basis: 100%; }\n    }\n    @media print {\n      .controlbar, .accordion-controls, .skip-link, .detail-nav, .detail-close, .card-cue { display: none !important; }\n      #view-cards, #view-list { display: none !important; }\n      .print-only { display: block !important; }\n      .print-topic { break-inside: avoid; margin-bottom: 1.5rem; border-left: 4px solid #3CBBBA; padding-left: 1rem; }\n      .site-footer { background: #fff; color: #000; }\n      .footer-section h2 { color: #1A2B4A; }\n      .footer-section p, .footer-section li { color: #333; }\n      a { color: #1A2B4A; text-decoration: none; }\n      body { font-size: 12pt; }\n    }\n  <\u002Fstyle>\n<\u002Fhead>\n\n<body>\n\n  \n\n  <a href=\"#main-content\" class=\"skip-link\">Skip to main content<\u002Fa>\n\n  <header class=\"site-header\" role=\"banner\">\n    <div class=\"container\">\n      <img class=\"site-logo\" src=\"ebca7e29-e2ab-4803-9d97-4e822bb24860\" alt=\"IIH UK charity logo\" width=\"72\" height=\"72\">\n      <div class=\"site-header-text\">\n        <div class=\"site-title\">IIH UK<\u002Fdiv>\n        <div class=\"site-subtitle\">Supporting people with Idiopathic Intracranial Hypertension<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <div class=\"asset-banner\" role=\"region\" aria-label=\"Document title\">\n    <div class=\"container\">\n      <div class=\"asset-banner-inner\">\n        <h1>Information for Family, Friends and Carers<\u002Fh1>\n        <a class=\"print-pill\" href=\"https://iih.org.uk/patient-leaflets/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"Want a printed copy? Visit iih.org.uk\">🖨️ Want a printed copy?<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- CONTROL BAR: view switch only (topic jumps now live in the sidebar) -->\n  <div class=\"controlbar\">\n    <div class=\"container\">\n      <div class=\"controlbar-inner\">\n        <span class=\"controlbar-label\">View as<\u002Fspan>\n        <div class=\"view-switch\" role=\"group\" aria-label=\"Choose how to read this guide\">\n          <button id=\"btn-view-cards\" type=\"button\" aria-pressed=\"true\">▦ Cards<\u002Fbutton>\n          <button id=\"btn-view-list\" type=\"button\" aria-pressed=\"false\">☰ List<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <main id=\"main-content\" class=\"main-content\">\n    <div class=\"container layout\">\n\n      <aside class=\"sidebar\" aria-label=\"Jump to a topic\">\n        <nav class=\"topic-nav\">\n          <p class=\"sidebar-title\">Jump to a topic<\u002Fp>\n          <ul id=\"topic-nav\"><\u002Ful>\n        <\u002Fnav>\n      <\u002Faside>\n\n      <div class=\"content\">\n\n      <div class=\"intro\">\n        <p class=\"lead\">When someone you love has IIH, it can be hard to know what is happening or how to help. This guide is for their family, friends and carers.<\u002Fp>\n        <p>It explains IIH in plain words — what it is, <strong>why it can feel the way it does<\u002Fstrong>, and practical ways to support the person you care for, while also looking after yourself. You do not need to read it all at once. Open the topic you need; each one is short and stands on its own.<\u002Fp>\n      <\u002Fdiv>\n\n      <!-- CARDS VIEW -->\n      <section id=\"view-cards\" aria-label=\"Topics as cards\">\n        <div class=\"cards-grid\" id=\"cards-grid\"><\u002Fdiv>\n        <div class=\"detail-panel\" id=\"detail-panel\" hidden=\"\">\n          <div class=\"detail-head\">\n            <span class=\"card-letter\" id=\"detail-letter\" aria-hidden=\"true\"><\u002Fspan>\n            <h2 id=\"detail-title\" tabindex=\"-1\"><\u002Fh2>\n            <button class=\"detail-close\" id=\"detail-close\" type=\"button\">✕ Close<\u002Fbutton>\n          <\u002Fdiv>\n          <div class=\"detail-body rich\" id=\"detail-body\"><\u002Fdiv>\n          <div class=\"detail-nav\">\n            <button id=\"detail-prev\" type=\"button\">← Previous<\u002Fbutton>\n            <button id=\"detail-next\" type=\"button\">Next →<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsection>\n\n      <!-- LIST (ACCORDION) VIEW -->\n      <section id=\"view-list\" aria-label=\"Topics as a list\" hidden=\"\">\n        <div class=\"accordion-controls\">\n          <button class=\"btn-secondary\" id=\"btn-open-all\" type=\"button\">Open all<\u002Fbutton>\n          <button class=\"btn-secondary\" id=\"btn-close-all\" type=\"button\">Close all<\u002Fbutton>\n        <\u002Fdiv>\n        <div class=\"accordion-list\" id=\"accordion-list\" role=\"list\"><\u002Fdiv>\n      <\u002Fsection>\n\n      <\u002Fdiv><!-- /.content -->\n    <\u002Fdiv><!-- /.layout -->\n\n    <div class=\"container\">\n      <!-- HELP & SUPPORT (always visible) -->\n      <section class=\"help-band\" id=\"help\" aria-labelledby=\"help-heading\">\n        <h2 id=\"help-heading\">Where to get more help and support<\u002Fh2>\n        <p>You do not have to manage on your own. These organisations can help with information, benefits, work and local support.<\u002Fp>\n        <div class=\"help-grid\">\n          <a href=\"https://www.iih.org.uk\" class=\"signpost sp-teal\" target=\"_blank\" rel=\"noopener noreferrer\">\n            <span class=\"signpost-icon\" aria-hidden=\"true\">🔗<\u002Fspan>\n            <span>IIH UK — information, leaflets and support<\u002Fspan>\n          <\u002Fa>\n          <a href=\"https://www.facebook.com/groups/432155240173972\" class=\"signpost sp-blue\" target=\"_blank\" rel=\"noopener noreferrer\">\n            <span class=\"signpost-icon\" aria-hidden=\"true\">💬<\u002Fspan>\n            <span>IIH UK Support Group on Facebook<\u002Fspan>\n          <\u002Fa>\n          <a href=\"https://www.youtube.com/@IIHUKNationalCharity\" class=\"signpost sp-red\" target=\"_blank\" rel=\"noopener noreferrer\">\n            <span class=\"signpost-icon\" aria-hidden=\"true\">▶️<\u002Fspan>\n            <span>Watch IIH UK on YouTube<\u002Fspan>\n          <\u002Fa>\n          <a href=\"https://111.nhs.uk\" class=\"signpost sp-green\" target=\"_blank\" rel=\"noopener noreferrer\">\n            <span class=\"signpost-icon\" aria-hidden=\"true\">🏥<\u002Fspan>\n            <span>NHS 111 — urgent medical help, not emergency<\u002Fspan>\n          <\u002Fa>\n          <a href=\"https://www.samaritans.org\" class=\"signpost sp-indigo\" target=\"_blank\" rel=\"noopener noreferrer\">\n            <span class=\"signpost-icon\" aria-hidden=\"true\">📞<\u002Fspan>\n            <span>Samaritans — 116 123, free, any time<\u002Fspan>\n          <\u002Fa>\n          <a href=\"https://www.gov.uk/find-local-council\" class=\"signpost sp-amber\" target=\"_blank\" rel=\"noopener noreferrer\">\n            <span class=\"signpost-icon\" aria-hidden=\"true\">🏛️<\u002Fspan>\n            <span>Find your local council<\u002Fspan>\n          <\u002Fa>\n          <a href=\"https://www.citizensadvice.org.uk\" class=\"signpost sp-navy\" target=\"_blank\" rel=\"noopener noreferrer\">\n            <span class=\"signpost-icon\" aria-hidden=\"true\">⚖️<\u002Fspan>\n            <span>Citizens Advice — benefits and rights<\u002Fspan>\n          <\u002Fa>\n          <a href=\"https://www.carersuk.org\" class=\"signpost sp-teal\" target=\"_blank\" rel=\"noopener noreferrer\">\n            <span class=\"signpost-icon\" aria-hidden=\"true\">🤝<\u002Fspan>\n            <span>Carers UK — local carer support<\u002Fspan>\n          <\u002Fa>\n          <a href=\"mailto:info@iih.org.uk\" class=\"signpost sp-blue\">\n            <span class=\"signpost-icon\" aria-hidden=\"true\">✉️<\u002Fspan>\n            <span>Email IIH UK — info@iih.org.uk<\u002Fspan>\n          <\u002Fa>\n        <\u002Fdiv>\n      <\u002Fsection>\n\n      <!-- PRINT-ONLY full content (filled by JS) -->\n      <div class=\"print-only\" id=\"print-content\" aria-hidden=\"true\"><\u002Fdiv>\n\n    <\u002Fdiv>\n  <\u002Fmain>\n\n  <footer class=\
